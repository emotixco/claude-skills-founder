<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6172f3"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6172f3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6172f3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="900" y2="60" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#000" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#000" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#000" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="300" stroke="#000" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#000" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="300" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Glow effect behind icon -->
  <circle cx="450" cy="105" r="80" fill="url(#glow)"/>

  <!-- Terminal icon -->
  <rect x="415" y="70" width="70" height="50" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="428" y="102" font-family="monospace" font-size="20" fill="#6172f3">$_</text>

  <!-- Title -->
  <text x="450" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">claude-skills-founder</text>

  <!-- Tagline -->
  <text x="450" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64648a">Startup strategy from your terminal. 12 skills. Zero fluff.</text>

  <!-- Skill pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11">
    <rect x="140" y="228" width="90" height="26" rx="13" fill="#6172f3" fill-opacity="0.08" stroke="#6172f3" stroke-opacity="0.2" stroke-width="1"/>
    <text x="185" y="245" text-anchor="middle" fill="#6172f3">/validate-idea</text>

    <rect x="245" y="228" width="100" height="26" rx="13" fill="#6172f3" fill-opacity="0.08" stroke="#6172f3" stroke-opacity="0.2" stroke-width="1"/>
    <text x="295" y="245" text-anchor="middle" fill="#6172f3">/product-brief</text>

    <rect x="360" y="228" width="115" height="26" rx="13" fill="#6172f3" fill-opacity="0.08" stroke="#6172f3" stroke-opacity="0.2" stroke-width="1"/>
    <text x="417" y="245" text-anchor="middle" fill="#6172f3">/competitor-matrix</text>

    <rect x="490" y="228" width="110" height="26" rx="13" fill="#6172f3" fill-opacity="0.08" stroke="#6172f3" stroke-opacity="0.2" stroke-width="1"/>
    <text x="545" y="245" text-anchor="middle" fill="#6172f3">/pricing-strategy</text>

    <rect x="615" y="228" width="90" height="26" rx="13" fill="#6172f3" fill-opacity="0.08" stroke="#6172f3" stroke-opacity="0.2" stroke-width="1"/>
    <text x="660" y="245" text-anchor="middle" fill="#8b5cf6">/pitch-deck</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="350" y="280" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
